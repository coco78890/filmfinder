<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card col" style="min-height:180px">
  <div class="label-row"><span class="label">Empty & loading states</span><span class="meta">skeleton · empty</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div style="background:#fff;border:1px solid #E8E3D9;border-radius:8px;padding:14px">
      <div style="height:14px;width:60%;background:linear-gradient(90deg,#F6F1E8,#E8E3D9,#F6F1E8);background-size:200% 100%;animation:sk 1.2s linear infinite;border-radius:3px"></div>
      <div style="height:12px;width:85%;background:linear-gradient(90deg,#F6F1E8,#E8E3D9,#F6F1E8);background-size:200% 100%;animation:sk 1.2s linear infinite;border-radius:3px;margin-top:10px"></div>
      <div style="height:12px;width:40%;background:linear-gradient(90deg,#F6F1E8,#E8E3D9,#F6F1E8);background-size:200% 100%;animation:sk 1.2s linear infinite;border-radius:3px;margin-top:8px"></div>
    </div>
    <div style="background:#fff;border:1px dashed #D6D0C4;border-radius:8px;padding:18px;text-align:center;font-family:'Work Sans',sans-serif;color:#5C5A54;font-size:13px">
      <div style="font-family:'Source Serif 4',serif;font-size:17px;color:#141414;margin-bottom:4px">Keine Treffer gefunden.</div>
      Versuchen Sie einen anderen Suchbegriff.
    </div>
  </div>
  <style>@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
</div></body></html>
