<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.program{background:#fff;border:1px solid #E8E3D9;border-radius:8px;padding:14px 16px;box-shadow:0 1px 0 rgba(20,20,20,0.04);font-family:'Work Sans',sans-serif;display:flex;gap:14px;align-items:flex-start}
.program img{width:40px;height:40px;border-radius:6px;flex-shrink:0}
.program .time{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;color:#141414;font-variant-numeric:tabular-nums;min-width:54px}
.program .title{font-family:'Source Serif 4',serif;font-weight:500;font-size:17px;color:#141414;line-height:1.3;letter-spacing:-0.005em}
.program .meta{font-size:12px;color:#8F887B;margin-top:4px;display:flex;gap:8px;align-items:center}
.dot{width:3px;height:3px;border-radius:99px;background:#B9B3A5}
.live-bar{height:4px;background:#D8352A;margin:-14px -16px 12px;border-radius:8px 8px 0 0}
</style>
</head>
<body><div class="card col" style="min-height:190px">
  <div class="label-row"><span class="label">Program card</span><span class="meta">live · upcoming</span></div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="program">
      <div class="live-bar" style="position:absolute;left:0;right:0;top:0;height:4px;background:#D8352A;border-radius:8px 8px 0 0"></div>
      <img src="../assets/channels/daserste.svg">
      <div class="time">20:15</div>
      <div style="flex:1">
        <div class="title">Tatort: Borowski und der Fluch der weißen Möwe</div>
        <div class="meta">Das Erste<span class="dot"></span>Krimi<span class="dot"></span>89 Min.</div>
      </div>
    </div>
    <div class="program">
      <img src="../assets/channels/arte.svg">
      <div class="time">22:00</div>
      <div style="flex:1">
        <div class="title">Das Leben der Anderen</div>
        <div class="meta">arte<span class="dot"></span>Drama<span class="dot"></span>137 Min.</div>
      </div>
    </div>
  </div>
</div></body></html>
