<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card col" style="min-height:180px">
  <div class="label-row"><span class="label">Semantic · success / warning / info / accent</span><span class="meta">700 · 600 · 100</span></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div>
      <div class="label" style="margin-bottom:6px">Accent</div>
      <div class="swatch-row">
        <div class="swatch dark" style="background:#B22820;width:52px;height:40px"><span class="hex" style="font-size:9px">700</span></div>
        <div class="swatch dark" style="background:#D8352A;width:52px;height:40px"><span class="hex" style="font-size:9px">600</span></div>
        <div class="swatch" style="background:#FBE8E6;width:52px;height:40px"><span class="hex" style="font-size:9px">100</span></div>
      </div>
    </div>
    <div>
      <div class="label" style="margin-bottom:6px">Success</div>
      <div class="swatch-row">
        <div class="swatch dark" style="background:#155A38;width:52px;height:40px"><span class="hex" style="font-size:9px">700</span></div>
        <div class="swatch dark" style="background:#1F7A4D;width:52px;height:40px"><span class="hex" style="font-size:9px">600</span></div>
        <div class="swatch" style="background:#E3F1E9;width:52px;height:40px"><span class="hex" style="font-size:9px">100</span></div>
      </div>
    </div>
    <div>
      <div class="label" style="margin-bottom:6px">Warning</div>
      <div class="swatch-row">
        <div class="swatch dark" style="background:#9A6900;width:52px;height:40px"><span class="hex" style="font-size:9px">700</span></div>
        <div class="swatch dark" style="background:#C98A00;width:52px;height:40px"><span class="hex" style="font-size:9px">600</span></div>
        <div class="swatch" style="background:#FAEFD0;width:52px;height:40px"><span class="hex" style="font-size:9px">100</span></div>
      </div>
    </div>
    <div>
      <div class="label" style="margin-bottom:6px">Info</div>
      <div class="swatch-row">
        <div class="swatch dark" style="background:#1F5592;width:52px;height:40px"><span class="hex" style="font-size:9px">700</span></div>
        <div class="swatch dark" style="background:#2C6FB8;width:52px;height:40px"><span class="hex" style="font-size:9px">600</span></div>
        <div class="swatch" style="background:#E1ECF7;width:52px;height:40px"><span class="hex" style="font-size:9px">100</span></div>
      </div>
    </div>
  </div>
</div></body></html>
