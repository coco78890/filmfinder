<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.field{font-family:'Work Sans',sans-serif}
.field label{display:block;font-size:13px;font-weight:500;color:#141414;margin-bottom:6px}
.field input, .field select{width:100%;font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid #E8E3D9;border-radius:4px;background:#fff;color:#141414;box-sizing:border-box}
.field input:focus, .field select:focus{outline:2px solid #D8352A;outline-offset:2px;border-color:#D8352A}
.field .help{font-size:12px;color:#8F887B;margin-top:4px}
</style>
</head>
<body><div class="card col" style="min-height:170px">
  <div class="label-row"><span class="label">Form inputs</span><span class="meta">text · select · focus</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="field">
      <label>Suchbegriff</label>
      <input placeholder="z.B. Tatort, James Bond, Krimi…" value="Tatort">
      <div class="help">Mindestens 2 Zeichen.</div>
    </div>
    <div class="field">
      <label>Sender</label>
      <select><option>Alle Sender</option><option>Das Erste</option><option>ZDF</option></select>
    </div>
  </div>
</div></body></html>
