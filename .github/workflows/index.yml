name: Daily Embedding Index

on:
  schedule:
    # Runs every day at 7:00 AM UTC (9:00 AM Berlin time) — 1 hour before notification check
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  index-embeddings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-embeddings-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run embedding indexer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python index_embeddings.py
